<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mon PEA v3.5.0</title>
<meta name="theme-color" content="#0c0c10">
<meta name="description" content="Suivi de portefeuille PEA avec simulateur et analyses">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="fonts.css">
<script src="chart.umd.js"></script>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --bg: #0c0c10;
  --s1: #14141c;
  --s2: #1c1c26;
  --s3: #242430;
  --s4: #2c2c3a;
  --border: #2a2a38;
  --border2: #383848;
  --text: #f2f2f8;
  --text2: #8888a8;
  --text3: #484860;
  --green: #00e07a;
  --green-dim: #00e07a18;
  --green-border: #00e07a35;
  --red: #ff4466;
  --red-dim: #ff446618;
  --red-border: #ff446635;
  --blue: #4d9eff;
  --blue-dim: #4d9eff18;
  --blue-border: #4d9eff35;
  --gold: #ffb830;
  --gold-dim: #ffb83018;
  --purple: #9d7dff;
  --purple-dim: #9d7dff18;
  --purple-border: #9d7dff35;
  --cyan: #00d4ff;
  --cyan-dim: #00d4ff18;
  --r: 16px;
  --r2: 12px;
  --r3: 8px;
  --r4: 6px;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

body {
  display: flex;
  flex-direction: column;
}

.mono {
  font-family: 'JetBrains Mono', monospace;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0, 224, 122, 0.5); }
  50% { box-shadow: 0 0 0 5px rgba(0, 224, 122, 0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

/* ── APP SHELL ── */
.shell {
  max-width: 480px;
  margin: 0 auto;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── TOP BAR ── */
.topbar {
  flex-shrink: 0;
  padding: 14px 18px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
}

.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}

.app-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text2);
  flex: 1;
}

.app-version {
  font-size: 9px;
  opacity: 0.4;
  font-weight: 400;
  margin-left: 4px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-price {
  text-align: right;
}

.tp-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 600;
}

.tp-chg {
  font-size: 11px;
  font-weight: 600;
}

.tp-chg.up {
  color: var(--green);
}

.tp-chg.down {
  color: var(--red);
}

.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--s2);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
  transition: all 0.2s;
}

.icon-btn:hover {
  background: var(--s3);
  border-color: var(--border2);
}

.icon-btn.spinning {
  animation: spin 0.6s linear;
}

/* ── ASSET TABS ── */
.asset-tab-bar {
  flex-shrink: 0;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 0 14px;
}

.asset-tab-bar::-webkit-scrollbar {
  display: none;
}

.asset-tab {
  flex-shrink: 0;
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.asset-tab:hover {
  color: var(--text2);
}

.asset-tab.active {
  color: var(--text);
  border-bottom-color: var(--blue);
}

.asset-tab .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text3);
  transition: background 0.2s;
}

.asset-tab.active .dot {
  background: var(--blue);
}

.add-asset-btn {
  flex-shrink: 0;
  padding: 10px 14px;
  font-size: 18px;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

.add-asset-btn:hover {
  color: var(--green);
}

/* ── NAV TABS ── */
.nav-bar {
  flex-shrink: 0;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 10px 14px 0;
  background: var(--bg);
}

.nav-bar::-webkit-scrollbar {
  display: none;
}

.nav-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--s1);
  color: var(--text3);
  transition: all 0.2s;
  white-space: nowrap;
  font-family: 'Inter', sans-serif;
}

.nav-btn.active {
  color: #fff;
  border-color: transparent;
}

.nav-btn.n0.active {
  background: linear-gradient(135deg, #4d9eff, #7c6aff);
  box-shadow: 0 4px 14px rgba(77, 158, 255, 0.3);
}

.nav-btn.n1.active {
  background: linear-gradient(135deg, #00e07a, #00b4aa);
  box-shadow: 0 4px 14px rgba(0, 224, 122, 0.3);
}

.nav-btn.n2.active {
  background: linear-gradient(135deg, #ffb830, #ff7c5a);
  box-shadow: 0 4px 14px rgba(255, 184, 48, 0.3);
}

.nav-btn.n3.active {
  background: linear-gradient(135deg, #9d7dff, #e879f9);
  box-shadow: 0 4px 14px rgba(157, 125, 255, 0.3);
}

.nav-btn.n4.active {
  background: linear-gradient(135deg, #00d4ff, #4d9eff);
  box-shadow: 0 4px 14px rgba(0, 212, 255, 0.3);
}

.nav-btn.n5.active {
  background: linear-gradient(135deg, #00e07a, #00d4ff);
  box-shadow: 0 4px 14px rgba(0, 224, 122, 0.3);
}

/* ── SCROLL AREA ── */
.scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.scroll::-webkit-scrollbar {
  display: none;
}

.pad {
  padding: 14px 16px 100px;
}

/* ── CARDS ── */
.card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
  animation: fadeUp 0.2s ease;
}

.card-hd {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}

.chip-green {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid var(--green-border);
}

.chip-blue {
  background: var(--blue-dim);
  color: var(--blue);
  border: 1px solid var(--blue-border);
}

/* ── HERO SECTION ── */
.hero-total {
  font-size: 40px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
}

.hero-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.grid3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.mini-card {
  background: var(--s2);
  border-radius: var(--r3);
  padding: 10px 12px;
}

.mini-card.bc-green {
  background: var(--green-dim);
  border: 1px solid var(--green-border);
}

.mini-card.bc-blue {
  background: var(--blue-dim);
  border: 1px solid var(--blue-border);
}

.mini-card.bc-red {
  background: var(--red-dim);
  border: 1px solid var(--red-border);
}

.mini-card.bc-purple {
  background: var(--purple-dim);
  border: 1px solid var(--purple-border);
}

.mc-l {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.mc-l.g {
  color: var(--green);
}

.mc-l.b {
  color: var(--blue);
}

.mc-l.r {
  color: var(--red);
}

.mc-v {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.5px;
  font-family: 'JetBrains Mono', monospace;
}

.mc-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── PRICE CARD ── */
.price-big {
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
}

.price-chg {
  font-size: 14px;
  font-weight: 600;
  margin-top: 4px;
}

.price-chg.up {
  color: var(--green);
}

.price-chg.down {
  color: var(--red);
}

/* ── PRICE META ── */
.price-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.pm-item {
  font-size: 11px;
  color: var(--text3);
}

.pm-item span {
  color: var(--text2);
  font-weight: 600;
}

/* ── FORM ELEMENTS ── */
.form-field {
  margin-bottom: 12px;
}

.form-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.form-field input,
.form-field select {
  width: 100%;
  padding: 8px 12px;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: var(--r3);
  color: var(--text);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

.form-field input:focus,
.form-field select:focus {
  border-color: var(--blue);
}

.form-field input[type="range"] {
  padding: 0;
  height: 4px;
  cursor: pointer;
}

/* ── BUTTONS ── */
button {
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}

.btn {
  padding: 10px 16px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: #fff;
  border: none;
  border-radius: var(--r2);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.btn:active {
  transform: scale(0.98);
}

.btn-ghost {
  padding: 8px 12px;
  background: transparent;
  color: var(--blue);
  border: 1px solid var(--border2);
  border-radius: var(--r3);
  font-size: 12px;
  font-weight: 600;
}

.btn-ghost:hover {
  border-color: var(--blue);
  background: var(--blue-dim);
}

/* ── SLIDER ── */
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--s3);
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--blue);
  cursor: pointer;
  border: 2px solid var(--bg);
}

input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--blue);
  cursor: pointer;
  border: 2px solid var(--bg);
}

/* ── ALERT ── */
.alert-bar {
  background: var(--s2);
  border-radius: var(--r3);
  padding: 12px;
  margin-top: 10px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.alert-inp {
  background: var(--s3);
  border: 1px solid var(--border2);
  border-radius: var(--r4);
  padding: 6px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  width: 90px;
  outline: none;
}

.alert-inp:focus {
  border-color: var(--blue);
}

.alert-active {
  background: var(--green-dim);
  border: 1px solid var(--green-border);
  border-radius: var(--r3);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--green);
  margin-top: 6px;
  width: 100%;
}

/* ── HISTORY ── */
.month-block {
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}

.month-block:hover {
  border-color: var(--border2);
}

.mb-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.mb-month {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.mb-badge {
  font-size: 10px;
  color: var(--text3);
}

.mb-items {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.mb-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-top: 1px solid var(--border);
}

.mb-item-left {
  display: flex;
  flex-direction: column;
}

.mb-item-date {
  font-size: 11px;
  color: var(--text2);
  font-weight: 600;
}

.mb-item-detail {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

.mb-item-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.mb-item-qty {
  font-size: 13px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

.mb-item-price {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── MODALS ── */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  max-width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideIn 0.3s ease;
}

.modal-header {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-close {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 20px;
  cursor: pointer;
}

.modal-close:hover {
  color: var(--text);
}

/* ── UTILITY ── */
.hidden {
  display: none !important;
}

.text-center {
  text-align: center;
}

.mt-1 {
  margin-top: 8px;
}

.mt-2 {
  margin-top: 16px;
}

.mb-1 {
  margin-bottom: 8px;
}

.gap-1 {
  gap: 8px;
}

@media (max-width: 380px) {
  .nav-btn {
    font-size: 10px;
    padding: 6px 12px;
  }
  
  .hero-total {
    font-size: 32px;
  }
  
  .card {
    padding: 12px;
  }
}
</style>

</head>
<body>

<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="live-dot" id="live-dot"></div>
    <div class="app-title">MON PEA <span class="app-version">v3.5.0</span></div>
    <div class="topbar-right">
      <div class="topbar-price" id="topbar-price" style="display:none;">
        <div class="tp-val" id="tp-val">—</div>
        <div class="tp-chg" id="tp-chg">—</div>
      </div>
      <button class="icon-btn" id="refresh-btn" onclick="refreshPrices()">🔄</button>
      <button class="icon-btn" id="settings-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>

  <!-- ASSET TABS -->
  <div class="asset-tab-bar" id="asset-tab-bar">
    <div class="asset-tab all-tab active" onclick="switchAsset(null)">
      <span style="color: var(--purple);">●</span> Tous
    </div>
  </div>

  <!-- NAV TABS -->
  <div class="nav-bar">
    <button class="nav-btn n0 active" onclick="goTab(0,this)">📊 Portefeuille</button>
    <button class="nav-btn n1" onclick="goTab(1,this)">📈 Graphique</button>
    <button class="nav-btn n2" onclick="goTab(2,this)">💳 Opérations</button>
    <button class="nav-btn n3" onclick="goTab(3,this)">🔮 Simulateur</button>
    <button class="nav-btn n4" onclick="goTab(4,this)">👤 Assistant</button>
    <button class="nav-btn n5" onclick="goTab(5,this)">⚙️ Paramètres</button>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll" id="scroll-area">
    <div class="pad" id="content"></div>
  </div>

</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <span>Paramètres</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div id="settings-content"></div>
  </div>
</div>

<!-- SCRIPT -->
<script>
const VERSION = '3.5.0';
const APP_NAME = 'MonPEA';

let currentTab = 0;
let currentAssetId = null;
let assets = [];
let chartInsts = {};
let taxRate = 0.186;
let simRate = 0.07;
let simM = 100;
let simY = 20;

const colors = {
  bg: '#0c0c10',
  s1: '#14141c',
  s2: '#1c1c26',
  s3: '#242430',
  border: '#2a2a38',
  text: '#f2f2f8',
  text2: '#8888a8',
  text3: '#484860',
  green: '#00e07a',
  red: '#ff4466',
  blue: '#4d9eff',
  purple: '#9d7dff',
  gold: '#ffb830',
  cyan: '#00d4ff',
};

// ════════════════════════════════════════
// STORAGE & PERSISTENCE
// ════════════════════════════════════════
function saveAll() {
  const data = {
    assets: assets,
    taxRate: taxRate,
    simRate: simRate,
    simM: simM,
    simY: simY,
    timestamp: new Date().toISOString(),
  };
  localStorage.setItem(APP_NAME, JSON.stringify(data));
}

function loadAll() {
  const saved = localStorage.getItem(APP_NAME);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      assets = data.assets || [];
      taxRate = data.taxRate || 0.186;
      simRate = data.simRate || 0.07;
      simM = data.simM || 100;
      simY = data.simY || 20;
    } catch (e) {
      console.error('Load failed:', e);
      assets = [];
    }
  }
}

// ════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════
function sg(n) {
  return n >= 0 ? '+' : '';
}

function fmtK(v) {
  if (v >= 1000) return (v / 1000).toFixed(1) + 'k';
  return Math.round(v).toLocaleString('fr-FR');
}

function fE(v, decimals = 0) {
  return v.toLocaleString('fr-FR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }) + '€';
}

function curAsset() {
  return assets.find(a => a.id === currentAssetId);
}

function isOpen() {
  const now = new Date();
  const day = now.getDay();
  const hour = now.getHours();
  return day >= 1 && day <= 5 && hour >= 9 && hour <= 17;
}

// ════════════════════════════════════════
// YAHOO FINANCE API
// ════════════════════════════════════════
async function fetchAssetPrice(asset) {
  if (!asset.ticker) return;
  try {
    const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${asset.ticker}?modules=price`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.quoteSummary && data.quoteSummary.result) {
      const price = data.quoteSummary.result[0]?.price?.regularMarketPrice?.raw;
      if (price) {
        asset.prev = asset.price || price;
        asset.price = price;
        asset.loaded = true;
      }
    }
  } catch (e) {
    console.warn(`Failed to fetch ${asset.ticker}:`, e);
  }
}

// ASSET MANAGEMENT
// ════════════════════════════════════════
function assetStats(asset) {
  if (!asset.deps || asset.deps.length === 0) {
    return { avg: 0, total: 0, parts: 0 };
  }
  const total = asset.deps.reduce((s, d) => s + d.parts * d.price, 0);
  const parts = asset.deps.reduce((s, d) => s + d.parts, 0);
  const avg = parts > 0 ? total / parts : 0;
  return { avg, total, parts };
}

function calcCap(m, y, r) {
  let total = 0;
  for (let i = 0; i < y * 12; i++) {
    total = (total + m) * (1 + r / 12);
  }
  return total;
}

function updateSim() {
  const versed = simM * 12 * simY;
  const capital = calcCap(simM, simY, simRate);
  const gains = capital - versed;
  const gainsPct = versed > 0 ? (gains / versed) * 100 : 0;
  const taxPEA = Math.max(0, gains) * taxRate;
  const taxNorm = Math.max(0, gains) * 0.30;
  const taxSaved = taxNorm - taxPEA;

  document.getElementById('sim-versed').textContent = fE(versed);
  document.getElementById('sim-versed-detail').textContent = `${simM}€ × ${simY * 12} mois`;
  document.getElementById('sim-capital').textContent = fE(capital);
  document.getElementById('sim-gains').textContent = sg(gains) + fE(gains);
  document.getElementById('sim-gains-pct').textContent = sg(gainsPct) + gainsPct.toFixed(1) + '%';
  document.getElementById('sim-parts').textContent = '—';
  document.getElementById('sim-parts-detail').textContent = 'À mettre à jour';
  document.getElementById('sim-tax-pea').textContent = fE(taxPEA);
  document.getElementById('sim-tax-norm').textContent = fE(taxNorm);
  document.getElementById('sim-tax-saved').textContent = fE(taxSaved);

  drawSimChart(simM, simY, simRate);
}

      </div>
    </div>
  `;
}

function updateTaxRate() {
  const input = document.getElementById('tax-rate-input');
  if (input) {
    taxRate = parseFloat(input.value) / 100;
    saveAll();
  }
}

function exportData() {
  const data = JSON.stringify({ assets, taxRate, simRate, simM, simY }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `MonPEA_backup_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        assets = data.assets || [];
        taxRate = data.taxRate || 0.186;
        simRate = data.simRate || 0.07;
        simM = data.simM || 100;
        simY = data.simY || 20;
        saveAll();
        alert('✅ Données importées avec succès');
        render();
      } catch (err) {
        alert('❌ Erreur d\'import : ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function goTab(idx, btn) {
  currentTab = idx;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function openSettings() {
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
  saveAll();
}

function refreshPrices() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  Promise.all(assets.map(fetchAssetPrice)).then(() => {
    btn.classList.remove('spinning');
    render();
    updateHeader();
  });
}

function updateHeader() {
  const ca = curAsset();
  if (!ca) return;

  const tp = document.getElementById('topbar-price');
  const tv = document.getElementById('tp-val');
  const tc = document.getElementById('tp-chg');

  if (tp) tp.style.display = 'block';
  if (tv) tv.textContent = ca.price.toFixed(3) + '€';
  if (tc) {
    const chg = ca.price - ca.prev;
    const pct = ca.prev > 0 ? (chg / ca.prev * 100) : 0;
    tc.textContent = sg(chg) + pct.toFixed(2) + '%';
    tc.className = 'tp-chg ' + (chg >= 0 ? 'up' : 'down');
  }

  const ld = document.getElementById('live-dot');
  if (ld) ld.style.background = isOpen() ? 'var(--green)' : 'var(--red)';
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
function init() {
  loadAll();
  
  // Demo asset si vide
  if (assets.length === 0) {
    assets = [{
      id: 'dcam',
      name: 'DCAM (Amundi PEA Monde MSCI World)',
      ticker: 'DCAM.PA',
      price: 5.973,
      prev: 5.973,
      virements: [],
      deps: [],
      loaded: false,
    }];
  }

  currentAssetId = assets[0]?.id || null;
  
  buildAssetTabs();
  render();
  
  Promise.all(assets.map(fetchAssetPrice)).then(() => {
    updateHeader();
    render();
  });

  // Refresh chaque 30s
  setInterval(() => {
    Promise.all(assets.map(fetchAssetPrice)).then(() => {
      updateHeader();
      if (!isUserInModal()) render();
    });
  }, 30000);

  // Register SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

function isUserInModal() {
  return document.getElementById('settings-modal').classList.contains('open');
}

window.addEventListener('load', init);
</script>
